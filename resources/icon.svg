<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded corner background with gradient matching App.tsx logo container -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg-gradient)"/>
  
  <!-- Outer border glow -->
  <rect x="20" y="20" width="984" height="984" rx="204" stroke="url(#border-gradient)" stroke-width="16" stroke-opacity="0.3"/>

  <!-- Centered & Scaled Isometric 3-Stacked layers representing ChartMon -->
  <g transform="translate(512, 512) scale(31.2) translate(-12, -12)">
    <!-- Bottom layer -->
    <path d="M2 17L12 22L22 17" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Middle layer -->
    <path d="M2 12L12 17L22 12" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Top layer -->
    <path d="M12 2L2 7L12 12L22 7Z" fill="#1e1b4b" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Cute glowing eyes -->
    <circle cx="9" cy="7" r="1.5" fill="#50e3c2" filter="url(#glow)"/>
    <circle cx="15" cy="7" r="1.5" fill="#50e3c2" filter="url(#glow)"/>
  </g>

  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f0c24" />
    </radialGradient>

    <!-- Border Gradient -->
    <linearGradient id="border-gradient" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>

    <!-- Glowing Eye Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
